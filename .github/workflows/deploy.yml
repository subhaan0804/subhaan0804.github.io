name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Minified Assets
        run: npm run build

      - name: Inject Minified Assets into HTML
        run: |
          # Replace local CSS references with .min.css
          sed -i 's|assets/css/main.css|assets/css/main.min.css|g' index.html
          sed -i 's|assets/css/components.css|assets/css/components.min.css|g' index.html
          sed -i 's|assets/css/animations.css|assets/css/animations.min.css|g' index.html
          sed -i 's|assets/css/chat.css|assets/css/chat.min.css|g' index.html
          
          # Replace local JS references with .min.js
          sed -i 's|assets/js/icons.js|assets/js/icons.min.js|g' index.html
          sed -i 's|assets/js/renderer.js|assets/js/renderer.min.js|g' index.html
          sed -i 's|assets/js/animations.js|assets/js/animations.min.js|g' index.html
          sed -i 's|assets/js/chat.js|assets/js/chat.min.js|g' index.html
          sed -i 's|assets/js/main.js|assets/js/main.min.js|g' index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
